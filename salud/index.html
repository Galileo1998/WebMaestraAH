<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <title>Centros de Salud - Acción Honduras</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <!-- Incluye GSAP desde CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333333;
            overflow: hidden;
        }
        #map, #historyContent, #portfolioContent {
            height: 100vh;
            padding-bottom: 150px;
            display: none;
        }
        
        .tab-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #f1f1f1;
            display: flex;
            justify-content: space-around;
            border-bottom: 1px solid #ccc;
            z-index: 1000;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            cursor: pointer;
            font-size: 18px;
        }
        .tab:hover, .tab.active {
            background: #ddd;
        }

        .leaflet-marker-icon.selected {
            animation: energy-halo 1.5s infinite ease-in-out;
        }

        @keyframes energy-halo {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.5)); }
            50% { transform: scale(1.3); filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.8)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.5)); }
        }
    
        .swiper-container {
            width: 80%;
            height: auto;
            margin: 0 auto;
            padding: 20px 0;
        }

        .swiper-slide {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .swiper-slide img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        /* Colores de marca */
        :root {
            --primary-color: #46b094;
            --secondary-color: #34859b;
            --accent-color: #b4d6e0;
            --background-color: #ffffff;
            --text-color: #333333;
            --highlight-color: #46b094;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --transition-speed: 0.6s;
        }

        .container {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        .header {
            height: 80px;
            background-color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0px 4px 10px var(--shadow-color);
            color: white;
            position: fixed;
            width: 96%;
            z-index: 10;
            margin-top: 40px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: bold;
            text-align:center;
        }

        .header img {
            height: 60px;
        }

        .slides {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            margin-top: 80px;
        }

        .slide {
            min-width: 100%;
            height: 80%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: absolute;
            background-color: var(--background-color);
            box-shadow: 0px 4px 20px var(--shadow-color);
            transition: transform var(--transition-speed) ease-in-out, opacity var(--transition-speed) ease-in-out;
            opacity: 0;
            transform: translateX(100%);
            border-radius: 20px;
            padding: 40px;
        }

        .slide.active {
            transform: translateX(0);
            opacity: 1;
            z-index: 2;
        }

        .slide h2 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-align: center;
        }

        .nav-buttons {
            position: fixed;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .nav-button {
            background-color: var(--secondary-color);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0px 5px 15px var(--shadow-color);
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .nav-button:hover {
            background-color: var(--highlight-color);
            transform: translateY(-5px);
        }

        .nav-indicators {
            display: flex;
            gap: 10px;
            justify-content: center;
            position: fixed;
            bottom: 80px;
            width: 100%;
            z-index: 10;
        }

        .nav-indicator {
            width: 12px;
            height: 12px;
            background-color: var(--accent-color);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .nav-indicator.active {
            background-color: var(--primary-color);
            transform: scale(1.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 8px;
            border: 1px solid #ddd;
        }
        th {
            background-color: #46b094;
            color: white;
        }
        
       .table-container {
            width: 75%;
            max-height: 80%; 
            overflow-x: auto; 
            overflow-y: auto; 
            border: 1px solid #ddd; 
            background-color: white; 
            padding: 20px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            margin: 0 auto;
        }

        /* Abejas */
        .bee-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .bee {
            position: absolute;
            width: 100px;
            height: 100px;
        }

    </style>
</head>
<body>

<div class="tab-container">
    <div class="tab active" id="mapTab" onclick="showContent('map')">CENTROS DE SALUD</div>
</div>

<div id="map" style="display: block; padding-top: 50px;">
    <div style="position: absolute; top: 60px; right: 20px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);">
        <input type="radio" id="showMarkers" name="markerToggle" value="show" checked> <label for="showMarkers">Mostrar Centros de Salud</label><br>
        <input type="radio" id="hideMarkers" name="markerToggle" value="hide"> <label for="hideMarkers">Ocultar Centros de Salud</label>
    </div>
</div>

<div id="historyContent">
    <!-- Contenido secundario -->
</div>

<script>
let geojsonLayer;
let markers = []; 
let map; 

function initMap() {
    map = L.map('map').setView([13.91, -87.4685], 11);

    const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenTopoMap contributors'
    });

    const wfsUrl = 'https://accionhonduras.org/mapa/limite_aldeas_hn0.geojson';

    // Colores por municipio (basado en COD_MUNI)
    const coloresPorMunicipio = {
        "0809": "#33865C",  // Lepaterique
        "0802": "#67BB87",  // Alubarén
        "0808": "#2C8028",  // La Venta
        "0815": "#89CC85",  // Reitoca
        "0804": "#8FBF13"   // Curarén
    };

    // Cargar el geojson y aplicar estilos por municipio
    fetch(wfsUrl)
        .then(response => response.json())
        .then(data => {
            const geojsonLayer = L.geoJson(data, {
                style: function (feature) {
                    let cod_muni_raw = feature.properties.COD_MUNI;
                    let cod_muni = "0000";

                    if (cod_muni_raw !== undefined && cod_muni_raw !== null) {
                        cod_muni = String(cod_muni_raw).trim().padStart(4, "0");
                    }

                    const color = coloresPorMunicipio[cod_muni] || "#CCCCCC"; 

                    return {
                        fillColor: color,
                        weight: 2,
                        opacity: 1,
                        color: 'white',
                        dashArray: '3',
                        fillOpacity: 0.7
                    };
                },
                onEachFeature: function (feature, layer) {
                    const nombre = feature.properties.NOMBRE || "Sin nombre";
                    const cod_muni_raw = feature.properties.COD_MUNI || "0000";
                    const cod_muni = String(cod_muni_raw).trim().padStart(4, "0");

                    layer.bindPopup(`<strong>Aldea:</strong> ${nombre}<br><strong>Municipio:</strong> ${cod_muni}`);
                }
            }).addTo(map);

            L.control.layers(
                { "Calles": streetLayer, "Topográfico": topoLayer },
                { "Límites de Aldeas": geojsonLayer }
            ).addTo(map);

            setTimeout(() => {
                map.flyToBounds(geojsonLayer.getBounds(), { duration: 2 });
            }, 1000);
        })
        .catch(error => console.error("Error cargando el GeoJSON:", error));


    // Nuevo ícono de salud (Hospital Flaticon 6144997)
    const customHealthIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/6144/6144997.png', 
        iconSize: [20, 20],
        iconAnchor: [16, 32],
        popupAnchor: [0, -32]
    });

// Lista de los CENTROS DE SALUD
    const centrosSalud = [
        // LEPATERIQUE
        { name: "Lepaterique | CIS | Lepaterique Centro", coords: [14.063890, -87.467500] },
        { name: "Lepaterique | UAPS | La Estancia", coords: [14.008330, -87.561110] },
        { name: "Lepaterique | UAPS | Las Tablas", coords: [14.066927736842668, -87.41329319406208] }, 
        { name: "Lepaterique | UAPS | Culguaque", coords: [14.072220, -87.547220] },
        { name: "Lepaterique | UAPS | Mulhuaca", coords: [13.995830, -87.467220] },
        { name: "Lepaterique | UAPS | Oropule", coords: [14.109841596704909, -87.51541985439994] },
        { name: "Lepaterique | UAPS | El Escarbadero", coords: [14.098280882449856, -87.40315060343677] },
        
        // LA VENTA
        { name: "La Venta | CIS | La Venta Centro", coords: [13.75556, -87.31472] },
        { name: "La Venta | UAPS | Opimuca", coords: [13.74722, -87.34444] },

        // ALUBARÉN
        { name: "Alubarén | CIS | Alubarén Centro", coords: [13.796057, -87.469178] },
        { name: "Alubarén | UAPS | Los Tablones", coords: [13.764033, -87.431196] },

        // CURAREN 
        { name: "Curarén | CIS | Curarén Centro", coords: [13.847779, -87.532349] },
        { name: "Curarén | UAPS | El Portillo", coords: [13.876939, -87.518536] },
        { name: "Curarén | UAPS | San Marcos de Curarén", coords: [13.767851, -87.584065] },
        { name: "Curarén | UAPS | Lodo Negro", coords: [13.847841, -87.606214] },
        { name: "Curarén | UAPS | La Cuchilla", coords: [13.772186, -87.567675] },

        // REITOCA
        { name: "Reitoca | UAPS | La Guadalupe", coords: [13.914720, -87.450000] },
        { name: "Reitoca | UAPS | Cerro Del Señor", coords: [13.820830, -87.412500] },
        { name: "Reitoca | UAPS | Santa Cruz", coords: [13.783330, -87.400560] },
        { name: "Reitoca | UAPS | Las Astas", coords: [13.826310361984032, -87.37241907259576] },
        { name: "Reitoca | CIS | Reitoca Centro", coords: [13.826029338869082, -87.46700532943602] }
    ];

    // Añadimos los puntos al mapa
    centrosSalud.forEach(punto => {
        const marker = L.marker(punto.coords, { icon: customHealthIcon }).addTo(map);
        marker.bindTooltip(punto.name, { permanent: false, direction: "top" });
        markers.push(marker); 
    });

    toggleMarkers(true);
}


// Función para mostrar/ocultar los marcadores
function toggleMarkers(show) {
    if (show) {
        markers.forEach(marker => {
            if (!map.hasLayer(marker)) marker.addTo(map);
        });
    } else {
        markers.forEach(marker => {
            if (map.hasLayer(marker)) map.removeLayer(marker);
        });
    }
}


function showContent(contentId) {
    const contentSections = document.querySelectorAll('#map, #historyContent, #portfolioContent');
    contentSections.forEach(section => {
        if (section) section.style.display = 'none';
    });

    const tabElements = document.querySelectorAll('.tab');
    tabElements.forEach(tab => {
        if (tab) tab.classList.remove('active');
    });

    const selectedContent = document.getElementById(contentId);
    if (selectedContent) selectedContent.style.display = 'block';

    const selectedTab = document.getElementById(contentId + "Tab");
    if (selectedTab) selectedTab.classList.add('active');
    
    if(contentId === 'map' && map) {
        setTimeout(() => { map.invalidateSize(); }, 100);
    }
}

// Inicializar al cargar el DOM 
document.addEventListener("DOMContentLoaded", () => {
    initMap();
    
    document.getElementById('showMarkers').addEventListener('change', () => toggleMarkers(true));
    document.getElementById('hideMarkers').addEventListener('change', () => toggleMarkers(false));

    // Animación Abejas
    const bees = document.querySelectorAll('.bee');
    bees.forEach((bee, index) => {
        let startY = Math.random() * window.innerHeight;
        bee.style.top = `${startY}px`;

        gsap.to(bee, {
            x: window.innerWidth + 100, 
            duration: 10 + Math.random() * 5, 
            ease: "linear",
            repeat: -1, 
            delay: index * 2, 
            modifiers: {
                x: gsap.utils.unitize(x => parseFloat(x) % (window.innerWidth + 200) - 100), 
                y: gsap.utils.unitize(y => {
                    return startY + Math.sin(parseFloat(x) / 100) * 50;
                })
            }
        });
    });
});

</script>
</body>
</html>
